version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ibemcom-prod-db
    environment:
      POSTGRES_USER: ${DB_USER:-ibemuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ibempass}
      POSTGRES_DB: ${DB_NAME:-ibemdb}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - ibemcom-prod-net
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ibemcom-prod-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecurepass}
    volumes:
      - redis_prod_data:/data
    networks:
      - ibemcom-prod-net
    restart: always

  minio:
    image: minio/minio:RELEASE.2024-03-07T09-43-48Z
    container_name: ibemcom-prod-storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_prod_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ibemcom-prod-net
    restart: always

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ibemcom-prod-app
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-ibemuser}:${DB_PASSWORD:-ibempass}@postgres:5432/${DB_NAME:-ibemdb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecurepass}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-ibemcom-media}
      JWT_PRIVATE_KEY_PATH: keys/private.pem
      JWT_PUBLIC_KEY_PATH: keys/public.pem
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
    volumes:
      - app_keys:/usr/src/app/keys
      - app_backups:/usr/src/app/backups
    networks:
      - ibemcom-prod-net
    restart: always

  nginx:
    image: nginx:stable-alpine
    container_name: ibemcom-prod-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
    depends_on:
      - app
    networks:
      - ibemcom-prod-net
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  app_keys:
  app_backups:
  certbot_etc:
  certbot_var:

networks:
  ibemcom-prod-net:
    driver: bridge
