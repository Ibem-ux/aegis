version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ibemcom-db
    environment:
      POSTGRES_USER: ibemuser
      POSTGRES_PASSWORD: ibempass
      POSTGRES_DB: ibemdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ibemcom-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ibemcom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ibemcom-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-03-07T09-43-48Z
    container_name: ibemcom-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ibemcom-network
    restart: unless-stopped

  # Optional local MinIO bucket creation step
  createbuckets:
    image: minio/mc:RELEASE.2024-03-07T12-32-15Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/ibemcom-media || true;
      /usr/bin/mc anonymous set download myminio/ibemcom-media || true;
      exit 0;
      "
    networks:
      - ibemcom-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  ibemcom-network:
    driver: bridge
