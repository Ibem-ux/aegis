name: aegis_chat
description: Aegis Secure Private Messenger Frontend
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^3.1.4 # Matches socket.io v4 server compatibility

  # Local DB & Hardware Security
  flutter_secure_storage: ^10.3.1
  drift: ^2.18.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # Security & Cryptography
  cryptography: ^2.5.0
  uuid: ^4.3.3

  # Media Handling & Files
  image_picker: ^1.1.2
  image: ^4.2.0
  audioplayers: ^6.0.0
  video_player: ^2.8.6
  file_picker: ^12.0.0-beta.5
  record: ^7.0.0
  path_provider: ^2.1.3
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.3.0
  workmanager: ^0.9.0+3

  # Scanning & QRs
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/aegis_logo.png"
  adaptive_icon_background: "#0B0F19"
  adaptive_icon_foreground: "assets/icon/aegis_logo.png"

flutter:
  uses-material-design: true
