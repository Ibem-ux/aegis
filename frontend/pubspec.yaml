name: aegis_chat
description: Aegis Secure Private Messenger Frontend
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3 # Matches socket.io v4 server compatibility

  # Local DB & Hardware Security
  flutter_secure_storage: ^9.2.2
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.22

  # Security & Cryptography
  cryptography: ^2.5.0
  uuid: ^4.3.3

  # Media Handling & Files
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  record: ^5.1.2
  path_provider: ^2.1.3

  # Scanning & QRs
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
